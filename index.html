<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BT Design · Executive Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg-0:#EAF2F1; --bg-1:#F2F7F6; --bg-2:#E2ECEB;
    --glass:rgba(255,255,255,.60); --glass-2:rgba(255,255,255,.72);
    --stroke:rgba(20,148,148,.10); --stroke-hover:rgba(20,148,148,.40);
    --ink:#0A2B2B; --ink-dim:#3D6B6B; --ink-faint:#7BA3A3;
    --cyan:#0E9488; --cyan-soft:rgba(14,148,136,.10);
    --rose:#E11D48; --rose-soft:rgba(225,29,72,.06);
    --amber:#D97706; --amber-soft:rgba(217,119,6,.08);
    --green:#0F9D6E; --green-soft:rgba(15,157,110,.10);
    --violet:#5B8A8A;
    --radius:18px;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    --font-display:'Inter','Inter Tight',-apple-system,sans-serif;
    --mono:'SF Mono','Consolas',monospace;
    --gap:24px; --pad-cell:24px; --pad-app:34px 30px 100px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--bg-0);
    background-image:linear-gradient(160deg, #F2F7F6 0%, #EAF2F1 45%, #E2ECEB 100%);
    background-attachment:fixed;
    color:var(--ink); font-family:var(--font); -webkit-font-smoothing:antialiased;
    transition:background .3s ease,color .3s ease;
  }
  #app{max-width:1500px;margin:0 auto;padding:var(--pad-app);transition:padding .5s ease;}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px;}
  .brand .kicker{font-family:var(--font);font-size:11px;text-transform:uppercase;color:var(--ink-dim);font-weight:600;margin-bottom:5px;}
  .brand h1{font-family:var(--font-display);font-size:21px;margin:0;font-weight:600;color:var(--ink);}
  .brand h1 b{font-weight:800;color:var(--cyan);}
  .chrome{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}

  .tabs{display:flex;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--stroke);border-radius:13px;padding:4px;gap:3px;}
  .tab{border:none;background:transparent;color:var(--ink-dim);font-family:var(--font);font-size:13px;font-weight:600;padding:8px 17px;border-radius:9px;cursor:pointer;transition:all .25s ease;}
  .tab.active{background:linear-gradient(180deg,rgba(14,148,136,.16),rgba(14,148,136,.05));color:var(--ink);border:1px solid var(--stroke-hover);box-shadow:inset 0 0 12px rgba(14,148,136,.10);}
  .tab:not(.active):hover{color:var(--ink);}

  .seg{display:flex;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--stroke);border-radius:13px;padding:4px;gap:3px;}
  .seg button{border:none;background:transparent;color:var(--ink-dim);font-family:var(--font);font-size:12px;font-weight:600;padding:8px 14px;border-radius:9px;cursor:pointer;transition:all .25s ease;}
  .seg button.active{background:rgba(14,148,136,.10);color:var(--cyan);}

  select{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--ink);border:1px solid var(--stroke);border-radius:11px;padding:9px 13px;font-size:13px;font-family:var(--font);cursor:pointer;transition:all .25s ease;}
  select:hover{border-color:var(--stroke-hover);}
  .iconbtn{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--ink);border:1px solid var(--stroke);border-radius:11px;height:39px;min-width:39px;padding:0 13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-family:var(--font);font-weight:600;transition:all .3s ease-out;}
  .iconbtn:hover{border-color:var(--stroke-hover);box-shadow:0 0 18px rgba(14,148,136,.12);}
  .iconbtn svg{width:15px;height:15px;}

  /* Focus Mode toggle — estado propio, distinto del resto de iconbtn */
  .focusbtn{position:relative;}
  .focusbtn.is-on{background:linear-gradient(180deg,rgba(14,148,136,.20),rgba(14,148,136,.07));border-color:rgba(14,148,136,.4);color:var(--cyan);box-shadow:0 0 16px rgba(14,148,136,.18);}
  .focusbtn svg{transition:transform .3s ease;}
  .focusbtn.is-on svg{transform:scale(1.05);}

  .periodline{font-family:var(--font);font-size:11px;color:var(--ink-faint);margin:0 2px 22px;transition:opacity .5s ease;}
  .periodline b{color:var(--ink-dim);font-weight:600;}

  .insight{position:relative;border-radius:var(--radius);padding:26px 28px;margin-bottom:24px;background:linear-gradient(135deg,rgba(255,255,255,.65),rgba(14,148,136,.05));backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid var(--stroke);box-shadow:0 8px 24px rgba(10,43,43,.04);overflow:hidden;transition:padding .5s ease,margin .5s ease;}
  .insight::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(14,148,136,.5),transparent);}
  .insight .eyebrow{font-family:var(--font);font-size:10px;text-transform:uppercase;color:var(--cyan);font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:8px;}
  .insight .eyebrow .pulse{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 2.4s ease-in-out infinite;}
  body.focus-mode .insight .eyebrow .pulse{animation:none;opacity:.85;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .insight p{margin:0;font-family:var(--font-display);font-size:clamp(18px,2.2vw,24px);line-height:1.45;font-weight:450;max-width:74ch;color:var(--ink);}
  .insight b{font-weight:700;}
  .insight .hl{color:var(--cyan);font-weight:600;}
  .insight .pos{color:var(--green);font-weight:600;}
  .insight .neg{color:var(--rose);font-weight:600;}

  .bento{display:grid;grid-template-columns:repeat(12,1fr);gap:var(--gap);transition:gap .5s ease;}
  .col-2{grid-column:span 2;}.col-3{grid-column:span 3;}.col-4{grid-column:span 4;}
  .col-5{grid-column:span 5;}.col-6{grid-column:span 6;}.col-7{grid-column:span 7;}
  .col-8{grid-column:span 8;}.col-9{grid-column:span 9;}.col-12{grid-column:span 12;}

  .cell{position:relative;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--stroke);border-radius:var(--radius);padding:var(--pad-cell);box-shadow:0 1px 3px rgba(10,43,43,.05),0 8px 24px rgba(10,43,43,.04);transition:all .3s ease-out,padding .5s ease;opacity:0;transform:translateY(12px);animation:rise .55s cubic-bezier(.22,.61,.36,1) forwards;display:flex;flex-direction:column;overflow:hidden;}
  .cell::before{content:"";position:absolute;inset:0;border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.45),transparent 45%);pointer-events:none;}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  .cell:hover{border-color:var(--stroke-hover);box-shadow:0 0 0 1px rgba(14,148,136,.06),0 10px 32px rgba(14,148,136,.10);transform:translateY(-2px);}

  /* Focus Mode: estática total, sin entrada animada, sin glows pulsantes */
  body.focus-mode .cell{animation:none;opacity:1;transform:none;}
  body.focus-mode .cell:hover{transform:none;}

  /* Focus Mode: ocultar tarjetas secundarias marcadas data-focus="hide" */
  .cell[data-focus="hide"]{transition:opacity .5s ease,max-height .5s ease,margin .5s ease,padding .5s ease;}
  body.focus-mode .cell[data-focus="hide"]{display:none;}

  /* Focus Mode: las tarjetas críticas (data-focus="primary") se expanden a todo lo ancho disponible */
  body.focus-mode .bento{grid-template-columns:repeat(12,1fr);}
  body.focus-mode .cell[data-focus="primary"].col-4{grid-column:span 6;}
  body.focus-mode .cell[data-focus="primary"].col-3{grid-column:span 6;}
  body.focus-mode .cell[data-focus="primary"].col-8{grid-column:span 12;}
  body.focus-mode .cell[data-focus="primary"].col-6{grid-column:span 12;}

  .cell.glow-rose{background:linear-gradient(180deg,rgba(225,29,72,.05),var(--glass));box-shadow:inset 0 0 12px rgba(225,29,72,.05);border-color:rgba(225,29,72,.22);}
  .cell.glow-rose:hover{border-color:rgba(225,29,72,.35);box-shadow:inset 0 0 14px rgba(225,29,72,.07),0 10px 32px rgba(225,29,72,.08);}
  .cell.glow-amber{background:linear-gradient(180deg,rgba(217,119,6,.05),var(--glass));box-shadow:inset 0 0 12px rgba(217,119,6,.05);border-color:rgba(217,119,6,.22);}
  .cell.glow-amber:hover{border-color:rgba(217,119,6,.35);box-shadow:inset 0 0 14px rgba(217,119,6,.07),0 10px 32px rgba(217,119,6,.08);}
  .cell.glow-green{background:linear-gradient(180deg,rgba(15,157,110,.04),var(--glass));box-shadow:inset 0 0 12px rgba(15,157,110,.05);border-color:rgba(15,157,110,.20);}
  /* En Focus Mode los glows quedan fijos y suaves, sin hover-intensify, para evitar parpadeo de atención */
  body.focus-mode .cell.glow-rose:hover,body.focus-mode .cell.glow-amber:hover{box-shadow:inset 0 0 14px rgba(225,29,72,.15);}

  .lbl{font-family:var(--font);font-size:10px;text-transform:uppercase;color:var(--ink-dim);font-weight:700;margin:0 0 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:relative;z-index:1;}
  .lbl .sub{font-weight:500;text-transform:none;color:var(--ink-faint);font-size:11px;}

  .aitag{font-family:var(--font);display:inline-flex;align-items:center;gap:4px;background:var(--cyan-soft);color:var(--cyan);font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;border:1px solid rgba(14,148,136,.20);white-space:nowrap;}
  .aitag.rose{background:var(--rose-soft);color:var(--rose);border-color:rgba(225,29,72,.25);}
  .aitag.amber{background:var(--amber-soft);color:var(--amber);border-color:rgba(217,119,6,.25);}
  .aitag.green{background:var(--green-soft);color:var(--green);border-color:rgba(15,157,110,.22);}
  .aitag::before{content:"";width:4px;height:4px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;}
  body.focus-mode .aitag::before{box-shadow:none;}

  .metric{font-family:var(--font-display);font-size:clamp(36px,4.8vw,56px);font-weight:300;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums;position:relative;z-index:1;}
  .metric .unit{font-size:.38em;color:var(--ink-dim);font-weight:500;margin-left:4px;}
  .verdict{font-family:var(--font);display:inline-flex;align-items:center;gap:6px;margin-top:15px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:30px;width:fit-content;position:relative;z-index:1;}
  .v-up{color:var(--green);background:var(--green-soft);}
  .v-down{color:var(--rose);background:var(--rose-soft);}
  .v-flat{color:var(--ink-dim);background:rgba(10,43,43,.05);}
  .word{font-family:var(--font);font-size:12px;color:var(--ink-dim);margin-top:10px;font-weight:400;position:relative;z-index:1;}
  .spark{margin-top:15px;height:36px;width:100%;position:relative;z-index:1;}
  .subnote{font-family:var(--font);font-size:11px;color:var(--ink-faint);margin-top:9px;position:relative;z-index:1;}
  .subnote.divider{border-top:1px solid var(--stroke);padding-top:11px;margin-top:13px;}
  .subnote b{color:var(--ink-dim);font-weight:600;}

  .ranklist{display:flex;flex-direction:column;gap:11px;margin-top:2px;position:relative;z-index:1;}
  .rankrow{font-family:var(--font);display:flex;align-items:center;gap:12px;font-size:12.5px;}
  .rankrow .nm{flex:1;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rankrow .vl{font-family:var(--mono);font-size:11px;color:var(--ink-faint);white-space:nowrap;}
  .track{height:6px;background:rgba(10,43,43,.06);border-radius:4px;overflow:hidden;flex:0 0 92px;}
  .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,rgba(148,163,184,.6),rgba(148,163,184,.9));}
  .fill.hl{background:linear-gradient(90deg,rgba(14,148,136,.6),var(--cyan));box-shadow:0 0 10px rgba(14,148,136,.4);}

  .chip{font-family:var(--font);display:flex;align-items:center;gap:10px;background:rgba(10,43,43,.03);border:1px solid var(--stroke);border-radius:11px;padding:10px 12px;font-size:12.5px;margin-bottom:8px;position:relative;z-index:1;transition:all .25s ease;}
  .chip:hover{border-color:var(--stroke-hover);}
  .chip .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-dim);}
  .chip .hrs{font-family:var(--mono);font-size:11px;color:var(--ink-faint);}
  .chip .rank{font-family:var(--font);width:19px;height:19px;border-radius:6px;background:rgba(10,43,43,.07);color:var(--ink-dim);font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .chip.top{border-color:rgba(14,148,136,.25);}
  .chip.top .rank{background:linear-gradient(135deg,rgba(14,148,136,.3),rgba(14,148,136,.15));color:var(--cyan);}

  .pitchhead{display:flex;align-items:center;gap:18px;margin-bottom:16px;position:relative;z-index:1;}
  .ring{position:relative;width:66px;height:66px;flex-shrink:0;}
  .ring .pctxt{font-family:var(--font-display);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);}
  .pitchlist{max-height:210px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;position:relative;z-index:1;}
  .pitem{font-family:var(--font);display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(10,43,43,.03);border-radius:9px;padding:8px 11px;font-size:12px;}
  .pitem .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-dim);}
  .badge{font-family:var(--font);font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .b-won{color:var(--green);background:var(--green-soft);}
  .b-lost{color:var(--rose);background:var(--rose-soft);}
  .b-pend{color:var(--ink-dim);background:rgba(10,43,43,.05);}

  canvas{max-width:100%;position:relative;z-index:1;}

  .loading{position:fixed;inset:0;background:var(--bg-0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:60;}
  .spin{width:32px;height:32px;border-radius:50%;border:3px solid rgba(10,43,43,.1);border-top-color:var(--cyan);animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .loadtx{font-family:var(--font);color:var(--ink-dim);font-size:13px;}
  .errbox{font-family:var(--font);background:var(--rose-soft);border:1px solid rgba(225,29,72,.3);border-radius:16px;padding:20px 22px;color:var(--ink);font-size:13px;max-width:560px;line-height:1.5;}
  .rfbtn{font-family:var(--font);background:var(--cyan);color:#06121a;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}

  @media (max-width:1080px){
    .col-3{grid-column:span 6;}.col-4{grid-column:span 6;}
    .col-5,.col-7,.col-8,.col-9{grid-column:span 12;}
  }
  @media (max-width:680px){
    #app{padding:18px 14px 80px;}
    .col-2,.col-3,.col-4,.col-5,.col-6,.col-7,.col-8,.col-9{grid-column:span 12;}
    .topbar{flex-direction:column;align-items:stretch;}
    .chrome{justify-content:space-between;}
    .metric{font-size:40px;}
  }
  body.focus-mode .cell[data-focus="primary"]{grid-column:span 12 !important;}
  @media (min-width:900px){
    body.focus-mode .cell[data-focus="primary"]{grid-column:span 6 !important;}
    body.focus-mode .cell[data-focus="primary"].col-wide{grid-column:span 12 !important;}
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(10,43,43,.1);border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>

const DEPT_MAP = [
  {re:/^02\s*-\s*all\s*(street|hs)$/i, group:"High Street", label:"All Street"},
  {re:/^02\s*-?\s*hs\s*-\s*cm$/i,   group:"High Street", label:"Capital Markets"},

  {re:/^01\s*-\s*all\s*retail$/i, group:"Retail MKT", label:"General"},
  {re:/^05\s*-\s*mkt$/i,          group:"Retail MKT", label:"Marketing"},
  {re:/^05\s*-\s*design$/i,       group:"Retail MKT", label:"Design"},
  {re:/^06\s*-\s*corporativo$/i, group:"Corporativo", label:"Corporativo"},
  {re:/^06\s*-\s*comit[ée]$/i,    group:"Corporativo", label:"Comité"},
];
function normDept(raw){
  if(!raw) return null;
  const clean = raw.trim().replace(/\s+/g," ");
  for(const d of DEPT_MAP){ if(d.re.test(clean)) return d; }
  return null;
}
const EXCLUDE_TIPOLOGIA = new Set(["tareas continuadas"]);
const EXCLUDE_DEPT_RAW = new Set(["out"]);

function toNumber(s){
  if(s===undefined||s===null) return 0;
  s = String(s).trim();
  if(s==="") return 0;
  s = s.replace(/\./g,"").replace(",",".");
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function hydrate(raw){
  return raw.map(r=>({
    mesIdx: r.mesIdx,
    tipologia: r.tipologia, tipoLower: r.tipologia.toLowerCase(),
    deptRaw: r.deptRaw, deptLower: r.deptRaw.toLowerCase(),
    ganado: r.ganado,
    nombreProyecto: r.nombreProyecto,
    entrada: r.entrada ? new Date(r.entrada+"T00:00:00") : null,
    diasProy: r.diasProy,
    ciudad: r.ciudad,
    hTotales: r.hTotales,
  }));
}

function isContinuada(rec){ return EXCLUDE_TIPOLOGIA.has(rec.tipoLower); }
function isOut(rec){ return EXCLUDE_DEPT_RAW.has(rec.deptLower) || EXCLUDE_DEPT_RAW.has(rec.tipoLower); }
function isRealProject(rec){ return !isContinuada(rec) && !isOut(rec); }

function aggregateByMonth(records){
  const months = Array.from({length:12}, ()=>({horas:0, proyectos:0}));
  records.forEach(r=>{
    months[r.mesIdx].horas += r.hTotales;
    if(isRealProject(r)) months[r.mesIdx].proyectos += 1;
  });
  return months;
}

function pct(curr, prev){
  if(prev === 0) return curr === 0 ? 0 : null;
  return ((curr-prev)/prev)*100;
}
function fmtPct(p){
  if(p===null) return "—";
  const sign = p>0 ? "+" : "";
  return sign + p.toFixed(1).replace(".",",") + "%";
}
function fmtNum(n, dec=0){
  return n.toLocaleString("es-ES",{minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function yoyClass(p){
  if(p===null) return "yoy-flat";
  if(p>0.05) return "yoy-up";
  if(p<-0.05) return "yoy-down";
  return "yoy-flat";
}
function yoyArrow(p){
  if(p===null) return "•";
  if(p>0.05) return "▲";
  if(p<-0.05) return "▼";
  return "■";
}

/* ===================== CAPACIDAD PRODUCTIVA REAL (días hábiles Comunidad de Madrid) =====================
   Jornada estándar: 8h/día · 1 persona. Festivos: calendario oficial CAM (nacional+autonómico),
   sin festivos locales municipales (varían por trabajador). L-V, excluyendo festivos en día laborable.
   Fuente: Decreto 75/2025 (CAM 2026) y calendario laboral CAM 2025. */
const JORNADA_HORAS_DIA = 8;
const DIAS_HABILES_2026 = [20,20,22,20,20,22,23,21,22,21,20,20]; // Ene..Dic
const DIAS_HABILES_2025 = [21,20,21,20,20,21,22,20,22,23,20,21]; // Ene..Dic

function capacidadDisponible(mesIdx, year){
  const tabla = year===2026 ? DIAS_HABILES_2026 : DIAS_HABILES_2025;
  return tabla[mesIdx] * JORNADA_HORAS_DIA;
}
// % de ocupación de un trabajador a tiempo completo: horas reales / horas disponibles según calendario CAM
function pctOcupacion(horas, mesIdx, year){
  const disp = capacidadDisponible(mesIdx, year);
  return disp>0 ? (horas/disp)*100 : null;
}
// Suma de capacidad disponible para un rango de meses (YTD)
function capacidadDisponibleRango(mesIdxs, year){
  return mesIdxs.reduce((s,mi)=>s+capacidadDisponible(mi,year),0);
}

function hexAlpha(c, a){
  c=(c||"").trim();
  if(c.startsWith("rgb")){
    const n=c.match(/[\d.]+/g)||[]; return `rgba(${n[0]||0},${n[1]||0},${n[2]||0},${a})`;
  }
  let hex=c.replace('#','');
  if(hex.length===3) hex=hex.split('').map(x=>x+x).join('');
  const r=parseInt(hex.substr(0,2),16)||0,g=parseInt(hex.substr(2,2),16)||0,b=parseInt(hex.substr(4,2),16)||0;
  return `rgba(${r},${g},${b},${a})`;
}

async function loadAll(){

/* ===================== MÉTRICAS (núcleo único — LÓGICA INTACTA) ===================== */
function computeMetrics(){
  const isYTD = viewMode==="ytd";
  const range = isYTD ? Array.from({length:currentMonth+1},(_,i)=>i) : [currentMonth];
  const agg26=aggregateByMonth(DATA26), agg25=aggregateByMonth(DATA25);
  const m26=DATA26.filter(r=>range.includes(r.mesIdx));
  const m25=DATA25.filter(r=>range.includes(r.mesIdx));
  const real26=m26.filter(isRealProject), real25=m25.filter(isRealProject);

  const totalProy=real26.length, totalProyPrev=real25.length;
  const totalProyYoy=pct(totalProy,totalProyPrev);

  const horas=m26.filter(r=>!isOut(r)).reduce((s,r)=>s+r.hTotales,0);
  const horasPrev=m25.filter(r=>!isOut(r)).reduce((s,r)=>s+r.hTotales,0);
  const horasYoy=pct(horas,horasPrev);

  // Capacidad productiva real: % de ocupación de 1 persona a jornada completa,
  // según días hábiles del calendario laboral de la Comunidad de Madrid (no festivos, no fines de semana).
  const capDisp26=capacidadDisponibleRango(range,2026);
  const capDisp25=capacidadDisponibleRango(range,2025);
  const ocupacionPct=capDisp26>0 ? (horas/capDisp26)*100 : null;
  const ocupacionPctPrev=capDisp25>0 ? (horasPrev/capDisp25)*100 : null;
  const ocupacionYoy=(ocupacionPct!==null && ocupacionPctPrev!==null) ? pct(ocupacionPct,ocupacionPctPrev) : null;

  const d26=real26.map(r=>r.diasProy).filter(d=>d!==null&&d>=0&&d<200);
  const d25=real25.map(r=>r.diasProy).filter(d=>d!==null&&d>=0&&d<200);
  const plazo=d26.length?d26.reduce((a,b)=>a+b,0)/d26.length:0;
  const plazoPrev=d25.length?d25.reduce((a,b)=>a+b,0)/d25.length:0;
  const plazoYoy=pct(plazo,plazoPrev);

  const ytdProy=agg26.slice(0,currentMonth+1).reduce((s,m)=>s+m.proyectos,0);
  const ytdHoras=agg26.slice(0,currentMonth+1).reduce((s,m)=>s+m.horas,0);
  const ytdProyPrev=agg25.slice(0,currentMonth+1).reduce((s,m)=>s+m.proyectos,0);
  const ytdHorasPrev=agg25.slice(0,currentMonth+1).reduce((s,m)=>s+m.horas,0);
  const ytdYoy=pct(ytdProy,ytdProyPrev), ytdHorasYoy=pct(ytdHoras,ytdHorasPrev);
  const ytdRange=Array.from({length:currentMonth+1},(_,i)=>i);
  const ytdCapDisp26=capacidadDisponibleRango(ytdRange,2026);
  const ytdCapDisp25=capacidadDisponibleRango(ytdRange,2025);
  const ytdOcupacionPct=ytdCapDisp26>0 ? (ytdHoras/ytdCapDisp26)*100 : null;
  const ytdOcupacionPctPrev=ytdCapDisp25>0 ? (ytdHorasPrev/ytdCapDisp25)*100 : null;
  const ytdOcupacionYoy=(ytdOcupacionPct!==null && ytdOcupacionPctPrev!==null) ? pct(ytdOcupacionPct,ytdOcupacionPctPrev) : null;
  const monthsElapsed=currentMonth+1;
  const avgPerMonth=ytdProy/monthsElapsed;
  const forecast=Math.round(avgPerMonth*12);
  const yearPrev25=agg25.reduce((s,m)=>s+m.proyectos,0);
  const forecastYoy=pct(forecast,yearPrev25);

  const tipoAgg={};
  real26.forEach(r=>{ (tipoAgg[r.tipologia]=tipoAgg[r.tipologia]||{horas:0,proyectos:0}); tipoAgg[r.tipologia].horas+=r.hTotales; tipoAgg[r.tipologia].proyectos+=1; });
  const topTipos=Object.entries(tipoAgg).sort((a,b)=>b[1].horas-a[1].horas).slice(0,5);

  const cityAgg={};
  m26.filter(r=>!isOut(r)).forEach(r=>{ (cityAgg[r.ciudad]=cityAgg[r.ciudad]||{horas:0,proyectos:0}); cityAgg[r.ciudad].horas+=r.hTotales; if(isRealProject(r)) cityAgg[r.ciudad].proyectos+=1; });
  const cities=Object.entries(cityAgg).filter(([c,v])=>v.proyectos>0||v.horas>0).sort((a,b)=>b[1].horas-a[1].horas);

  const deptOrder=["High Street","C. Comerciales","Research","Retail MKT","Corporativo"];
  const deptGroups={}; deptOrder.forEach(d=>deptGroups[d]={horas:0,proyectos:0});
  const deptGroups25={}; deptOrder.forEach(d=>deptGroups25[d]={horas:0,proyectos:0});
  m26.filter(r=>!isOut(r)).forEach(r=>{ const d=normDept(r.deptRaw); if(!d)return; deptGroups[d.group].horas+=r.hTotales; if(isRealProject(r)) deptGroups[d.group].proyectos+=1; });
  m25.filter(r=>!isOut(r)).forEach(r=>{ const d=normDept(r.deptRaw); if(!d)return; deptGroups25[d.group].horas+=r.hTotales; });

  const pitches=m26.filter(r=>r.tipoLower==="pitch");
  const pitchesPrev=m25.filter(r=>r.tipoLower==="pitch").length;
  const won=pitches.filter(r=>r.ganado==="SI"||r.ganado==="SÍ").length;
  const lost=pitches.filter(r=>r.ganado==="NO").length;
  const pend=pitches.length-won-lost;
  const winPct=pitches.length?(won/pitches.length*100):0;
  const pitchesYoy=pct(pitches.length,pitchesPrev);

  const rrss=m26.filter(r=>r.tipoLower==="rrss");
  const rrss25=m25.filter(r=>r.tipoLower==="rrss");
  const rrssYoy=pct(rrss.length,rrss25.length);
  const rrssHoras=rrss.reduce((s,r)=>s+r.hTotales,0);

  let destacados;
  if(!isYTD && FEATURED_BY_MONTH[currentMonth] && Array.isArray(FEATURED_BY_MONTH[currentMonth])){
    destacados=FEATURED_BY_MONTH[currentMonth];
  } else {
    destacados=real26.slice().sort((a,b)=>b.hTotales-a.hTotales).slice(0,6).map(p=>({nombreProyecto:p.nombreProyecto||"(sin nombre)",hTotales:p.hTotales}));
  }

  let rhythmLabels, rhythmVals;
  if(isYTD){
    rhythmLabels=range.map(i=>MES_NOMBRES[i].slice(0,3));
    rhythmVals=range.map(i=>agg26[i].proyectos);
  }else{
    const wk={};
    real26.forEach(r=>{ if(!r.entrada)return; const d=Math.min(Math.ceil(r.entrada.getDate()/7),5); wk[d]=(wk[d]||0)+1; });
    const keys=[1,2,3,4,5].filter(w=>wk[w]);
    rhythmLabels=keys.map(w=>"Sem "+w); rhythmVals=keys.map(w=>wk[w]);
  }
  const rhythmAvg=rhythmVals.length?rhythmVals.reduce((a,b)=>a+b,0)/rhythmVals.length:0;

  const yoyHorasSerie=agg26.map((m,i)=>pct(m.horas,agg25[i].horas));

  return {isYTD,range,agg26,agg25,
    totalProy,totalProyYoy,horas,horasYoy,plazo,plazoYoy,
    ocupacionPct,ocupacionYoy,capDisp26,
    ytdProy,ytdHoras,ytdYoy,ytdHorasYoy,monthsElapsed,avgPerMonth,forecast,forecastYoy,yearPrev25,
    ytdOcupacionPct,ytdOcupacionYoy,ytdCapDisp26,
    topTipos,cities,deptGroups,deptGroups25,deptOrder,
    pitches,won,lost,pend,winPct,pitchesYoy,
    rrss,rrssYoy,rrssHoras,destacados,
    rhythmLabels,rhythmVals,rhythmAvg,yoyHorasSerie};
}

/* ===================== HELPERS DE VEREDICTO / TAGS IA ===================== */
function verdictWord(yoy, lowerIsBetter){
  if(yoy===null) return {txt:"sin referencia",cls:"v-flat"};
  const good = lowerIsBetter ? yoy<-0.05 : yoy>0.05;
  const bad  = lowerIsBetter ? yoy>0.05  : yoy<-0.05;
  if(good) return {txt:"Por encima",cls:"v-up"};
  if(bad)  return {txt:"Por debajo",cls:"v-down"};
  return {txt:"En línea",cls:"v-flat"};
}
// Veredicto sobre el NIVEL ABSOLUTO de ocupación (no interanual): ¿está la persona dentro de su jornada disponible?
function ocupacionVerdict(pctOcup){
  if(pctOcup===null) return {txt:"sin datos",cls:"v-flat"};
  if(pctOcup>110) return {txt:"",cls:"v-down"}; // sobrecarga, aunque no es necesariamente negativo
  if(pctOcup<70)  return {txt:"",cls:"v-down"};
  return {txt:"",cls:"v-up"};
}
// Tag IA predictivo: proyecta el cierre estimado a fin de mes/periodo
function aiTag(label, cls){ return `<span class="aitag ${cls||''}">${label}</span>`; }
function trendTag(yoy, lowerIsBetter){
  if(yoy===null) return aiTag("Sin histórico","");
  const good = lowerIsBetter ? yoy<-0.05 : yoy>0.05;
  const bad  = lowerIsBetter ? yoy>0.05  : yoy<-0.05;
  if(good) return aiTag("IA · Tendencia al alza","green");
  if(bad)  return aiTag("IA · Señal de riesgo","rose");
  return aiTag("IA · Estable","");
}
// Tag IA de ocupación: sincronizado con el mismo umbral (70-110%) que el color del badge de ocupacionVerdict
function ocupacionTag(pctOcup){
  if(pctOcup===null) return aiTag("Sin histórico","");
  if(pctOcup>110) return aiTag("IA · Señal de riesgo","rose");
  if(pctOcup<70)  return aiTag("IA · Señal de riesgo","rose");
  return aiTag("IA · Estable","green");
}
// Glow de foco: rose si caída fuerte, amber si caída leve
function glowClass(yoy, lowerIsBetter){
  if(yoy===null) return "";
  const v = lowerIsBetter ? -yoy : yoy;
  if(v <= -0.15) return "glow-rose";
  if(v <= -0.05) return "glow-amber";
  return "";
}
// Glow específico para ocupación: alerta si muy por debajo (infrautilizado) o muy por encima (sobrecarga) de jornada
function glowOcupacion(pctOcup){
  if(pctOcup===null) return "";
  if(pctOcup>130 || pctOcup<60) return "glow-rose";
  if(pctOcup>110 || pctOcup<70) return "glow-amber";
  return "";
}

/* ===================== INSIGHT EJECUTIVO ===================== */
function buildInsight(m){
  const periodo = m.isYTD ? `El acumulado hasta ${MES_NOMBRES[currentMonth]}` : `${MES_NOMBRES[currentMonth]}`;
  const topDept = m.deptOrder.map(d=>[d,m.deptGroups[d].horas]).sort((a,b)=>b[1]-a[1])[0];
  const swings=[{k:"proyectos",v:m.totalProyYoy},{k:"horas",v:m.horasYoy}].filter(s=>s.v!==null);
  swings.sort((a,b)=>Math.abs(b.v)-Math.abs(a.v));
  const anomaly = swings.length?swings[0]:null;
  const proyYoyTxt = m.totalProyYoy===null ? "" : `<span class="${m.totalProyYoy>=0?'pos':'neg'}">${fmtPct(m.totalProyYoy)}</span> interanual`;
  let proyChunk = `<b>${fmtNum(m.totalProy)}</b> proyectos`;
  let horasChunk = `${fmtNum(m.horas)}h de capacidad`;
  if(anomaly && anomaly.k==="proyectos") proyChunk = `<span class="hl">${fmtNum(m.totalProy)} proyectos</span>`;
  if(anomaly && anomaly.k==="horas") horasChunk = `<span class="hl">${fmtNum(m.horas)}h</span> de capacidad`;
  const driver = topDept && topDept[1]>0 ? ` <b>${topDept[0]}</b> concentra el mayor rendimiento por espacio.` : "";
  let pitchTxt="";
  if(m.pitches.length>0){ pitchTxt = ` Los pitches comerciales cierran con un <b>${m.winPct.toFixed(0)}%</b> de conversión (${m.won}/${m.pitches.length}).`; }
  return `${periodo} cierra con ${proyChunk}${proyYoyTxt?` (${proyYoyTxt})`:''} y ${horasChunk}.${driver}${pitchTxt}`;
}

/* ===================== HELPERS UI ===================== */
function sparkSVG(values, colorVar){
  const w=200,h=36,n=values.length;
  if(n<2) return "";
  const max=Math.max(...values,1), min=Math.min(...values,0);
  const rng=(max-min)||1;
  const pts=values.map((v,i)=>{ const x=(i/(n-1))*w; const y=h-((v-min)/rng)*(h-5)-2.5; return `${x.toFixed(1)},${y.toFixed(1)}`; });
  const last=pts[pts.length-1].split(',');
  const areaPts=`0,${h} ${pts.join(' ')} ${w},${h}`;
  const gid="g"+Math.random().toString(36).slice(2,7);
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(${colorVar})" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="var(${colorVar})" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${areaPts}" fill="url(#${gid})"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="var(${colorVar})" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="var(${colorVar})"/>
  </svg>`;
}
function animateCount(el, target, dec, suffix){
  if(!el) return;
  const dur=850, t0=performance.now();
  const fmt=v=>fmtNum(v,dec)+(suffix||"");
  function step(now){
    const p=Math.min((now-t0)/dur,1);
    const e=1-Math.pow(1-p,3);
    el.textContent=fmt(target*e);
    if(p<1) requestAnimationFrame(step); else el.textContent=fmt(target);
  }
  requestAnimationFrame(step);
}
function destroyCharts(){ _charts.forEach(c=>{try{c.destroy();}catch(e){}}); _charts=[]; }
function runCounts(){
  document.querySelectorAll('[data-count]').forEach(el=>{
    const t=parseFloat(el.getAttribute('data-count'));
    const dec=parseInt(el.getAttribute('data-dec')||"0");
    if(isFocusMode){
      // Estático: sin animación de conteo para evitar fatiga visual y distracción
      el.textContent=fmtNum(t,dec);
    } else {
      animateCount(el,t,dec,"");
    }
  });
}

    ds.push({type:"line",label:"Var. YOY (%)",data:m.yoyHorasSerie,borderColor:c.violet,backgroundColor:"transparent",yAxisID:"y1",tension:.35,pointRadius:2.5,pointBackgroundColor:c.violet,borderWidth:2,order:1,spanGaps:true});
  }
  const scales={
    x:{grid:{display:false},ticks:{color:c.inkFaint,font:{size:11}}},
    y:{grid:{color:hexAlpha(c.inkFaint,.12)},ticks:{color:c.inkFaint},beginAtZero:true}
  };
  if(withYoyLine) scales.y1={position:"right",grid:{display:false},ticks:{color:c.inkFaint,callback:v=>v+'%'}};
  const trendTip={...tip(c),callbacks:{
    label:ctx=>{
      if(ctx.dataset.type==="line") return `${ctx.dataset.label}: ${ctx.formattedValue}%`;
      const proy=proyPorMes[ctx.dataIndex];
      return [`Horas: ${fmtNum(ctx.parsed.y,1)}h`,`Proyectos: ${fmtNum(proy)}`];
    }
  }};
  _charts.push(new Chart(el,{data:{labels:MES_NOMBRES.map(x=>x.slice(0,3)),datasets:ds},
    options:{plugins:{legend:{display:withYoyLine,labels:{color:c.inkDim,boxWidth:12,font:{size:11}}},tooltip:trendTip},scales}}));
}
function renderGeo(m, id){
  const el=document.getElementById(id); if(!el) return;
  const c=themeColors();
  const maxH=Math.max(1,...m.cities.map(x=>x[1].horas));
  _charts.push(new Chart(el,{type:"bubble",
    data:{datasets:m.cities.map(([city,v])=>({label:city,data:[{x:v.proyectos,y:1,r:7+(v.horas/maxH)*30}],backgroundColor:hexAlpha(c.cyan,.28),borderColor:c.cyan,borderWidth:1.5}))},
    options:{plugins:{legend:{display:false},tooltip:{...tip(c),callbacks:{label:ctx=>{const cc=m.cities[ctx.datasetIndex];return `${cc[0]}: ${fmtNum(cc[1].horas,1)}h · ${cc[1].proyectos}op`;}}}},
      scales:{x:{grid:{color:hexAlpha(c.inkFaint,.12)},ticks:{color:c.inkFaint},beginAtZero:true,title:{display:true,text:'Nº Operaciones',color:c.inkFaint,font:{size:10}}},y:{display:false,min:0,max:2}}},
    plugins:[{id:'lbl',afterDatasetsDraw(ch){const ctx=ch.ctx;ch.data.datasets.forEach((d,i)=>{const pt=ch.getDatasetMeta(i).data[0];if(!pt)return;ctx.save();ctx.font='600 11px '+getComputedStyle(document.body).fontFamily;ctx.fillStyle=c.inkDim;ctx.textAlign='center';ctx.fillText(d.label,pt.x,pt.y-pt.options.radius-5);ctx.restore();});}}]
  }));
}
function renderRhythm(m, id){
  const el=document.getElementById(id); if(!el) return;
  const c=themeColors();
  _charts.push(new Chart(el,{type:"bar",
    data:{labels:m.rhythmLabels,datasets:[
      {type:"bar",label:"Operaciones",data:m.rhythmVals,backgroundColor:hexAlpha(c.cyan,.6),borderRadius:6,order:2},
      {type:"line",label:"Media",data:m.rhythmVals.map(()=>m.rhythmAvg),borderColor:c.amber,borderWidth:2.5,pointRadius:0,borderDash:[6,4],order:1}
    ]},
    options:{plugins:{legend:{labels:{color:c.inkDim,boxWidth:12,font:{size:11}}},tooltip:tip(c)},
      scales:{x:{grid:{display:false},ticks:{color:c.inkFaint}},y:{grid:{color:hexAlpha(c.inkFaint,.12)},ticks:{color:c.inkFaint},beginAtZero:true}}}}));
}

/* ===================== FIN ===================== */

loadAll();

</script>
